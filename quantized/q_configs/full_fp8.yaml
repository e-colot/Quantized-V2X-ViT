name: 'FP8 full quantization'

pillar_vfe:
  quantize:
    PFN:
      type: fp8
      relu_type: fp8
    features:
      type: fp8
point_pillar_scatter:
  quantize:
    features:
      type: fp8
base_bev_backbone:
  quantize:
    layers:
      - type: fp8
        bn_type: fp8
        relu_type: fp8
      - type: fp8
        bn_type: fp8
        relu_type: fp8
      - type: fp8
        bn_type: fp8
        relu_type: fp8
    upsample:
      - type: fp8
        bn_type: fp8
        relu_type: fp8
      - type: fp8
        bn_type: fp8
        relu_type: fp8
      - type: fp8
        bn_type: fp8
        relu_type: fp8
shrink_header:
  quantize:
    - firstPass:
        type: fp8
        relu_type: fp8
      secondPass:
        type: fp8
        relu_type: fp8
compression:
  quantize: 
    encoder:
      type: fp8
      bn_type: fp8
      relu_type: fp8
    decoder:
      firstPass:
        type: fp8
        bn_type: fp8
        relu_type: fp8
      secondPass:
        type: fp8
        bn_type: fp8
        relu_type: fp8
transformer:
  quantize:
    sttf:
      type: fp32
    V2XTEncoderLinear:
      type: fp32
    RTE:
      embedding:
        type: fp32
      output:
        type: fp32
