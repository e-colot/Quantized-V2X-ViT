      type: fp8
      relu_type: fp8
    features:
      type: fp8
point_pillar_scatter:
  quantize:
    features:
      type: fp8
base_bev_backbone:
  quantize:
    layers:
      - type: fp8
        bn_type: fp8
        relu_type: fp8
      - type: fp8
        bn_type: fp8
        relu_type: fp8
      - type: fp8
        bn_type: fp8
        relu_type: fp8
    upsample:
      - type: fp8
        bn_type: fp8
        relu_type: fp8
      - type: fp8
        bn_type: fp8
        relu_type: fp8
      - type: fp8
        bn_type: fp8
        relu_type: fp8
shrink_header:
  quantize:
    - firstPass:
        type: fp8
        relu_type: fp8
      secondPass:
        type: fp8
        relu_type: fp8
