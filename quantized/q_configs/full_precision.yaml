name: 'full precision quantization'

pillar_vfe:
  quantize:
    PFN:
      type: fp32
      relu_type: fp32
    features:
      type: fp32
point_pillar_scatter:
  quantize:
    features:
      type: fp32
base_bev_backbone:
  quantize:
    layers:
      - type: fp32
        bn_type: fp32
        relu_type: fp32
      - type: fp32
        bn_type: fp32
        relu_type: fp32
      - type: fp32
        bn_type: fp32
        relu_type: fp32
    upsample:
      - type: fp32
        bn_type: fp32
        relu_type: fp32
      - type: fp32
        bn_type: fp32
        relu_type: fp32
      - type: fp32
        bn_type: fp32
        relu_type: fp32
shrink_header:
  quantize:
    - firstPass:
        type: fp32
        relu_type: fp32
      secondPass:
        type: fp32
        relu_type: fp32
