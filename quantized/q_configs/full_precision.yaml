name: 'full precision quantization'

pillar_vfe:
  quantize:
    PFN:
      type: fp32
      relu_type: fp32
    features:
      type: fp32
point_pillar_scatter:
  quantize:
    features:
      type: fp32
base_bev_backbone:
  quantize:
    layers:
      - type: fp32
        bn_type: fp32
        relu_type: fp32
      - type: fp32
        bn_type: fp32
        relu_type: fp32
      - type: fp32
        bn_type: fp32
        relu_type: fp32
    upsample:
      - type: fp32
        bn_type: fp32
        relu_type: fp32
      - type: fp32
        bn_type: fp32
        relu_type: fp32
      - type: fp32
        bn_type: fp32
        relu_type: fp32
shrink_header:
  quantize:
    - firstPass:
        type: fp32
        relu_type: fp32
      secondPass:
        type: fp32
        relu_type: fp32
compression:
  quantize: 
    encoder:
      type: fp32
      bn_type: fp32
      relu_type: fp32
    decoder:
      firstPass:
        type: fp32
        bn_type: fp32
        relu_type: fp32
      secondPass:
        type: fp32
        bn_type: fp32
        relu_type: fp32
transformer:
  quantize:
    sttf:
      type: fp32
    V2XTEncoderLinear:
      type: fp32
    RTE:
      embedding:
        type: fp32
      output:
        type: fp32
    V2XFusionBlock:
      hmsa:
      # not full control, could be finer as 'core' module of ViT
        linearIn:
          type: fp32
        linearOut:
          type: fp32
        relation:
          type: fp32
        attentionMap:
          type: fp32