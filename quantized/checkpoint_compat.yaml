version: 0.2
notes: Key remapping rules to load legacy checkpoints after quantization wrappers are introduced.
rules:
# PillarVFE
  - when_contains: .pfn_layers.
    old_suffix: .linear.weight
    new_suffix: .linear.linear.weight
  - when_contains: .pfn_layers.
    old_suffix: .linear.bias
    new_suffix: .linear.linear.bias
# BaseBEVBackbone
  - when_contains: .blocks.
    old_suffix: .1.weight
    new_suffix: .1.conv.weight
  - when_contains: .blocks.
    old_suffix: .1.bias
    new_suffix: .1.conv.bias
  - when_contains: .blocks.
    old_suffix: .4.weight
    new_suffix: .4.conv.weight
  - when_contains: .blocks.
    old_suffix: .4.bias
    new_suffix: .4.conv.bias
  - when_contains: .blocks.
    old_suffix: .7.weight
    new_suffix: .7.conv.weight
  - when_contains: .blocks.
    old_suffix: .7.bias
    new_suffix: .7.conv.bias
  - when_contains: .blocks.
    old_suffix: .10.weight
    new_suffix: .10.conv.weight
  - when_contains: .blocks.
    old_suffix: .10.bias
    new_suffix: .10.conv.bias
  - when_contains: .blocks.
    old_suffix: .13.weight
    new_suffix: .13.conv.weight
  - when_contains: .blocks.
    old_suffix: .13.bias
    new_suffix: .13.conv.bias
  - when_contains: .blocks.
    old_suffix: .16.weight
    new_suffix: .16.conv.weight
  - when_contains: .blocks.
    old_suffix: .16.bias
    new_suffix: .16.conv.bias
  - when_contains: .blocks.
    old_suffix: .19.weight
    new_suffix: .19.conv.weight
  - when_contains: .blocks.
    old_suffix: .19.bias
    new_suffix: .19.conv.bias
  - when_contains: .blocks.
    old_suffix: .22.weight
    new_suffix: .22.conv.weight
  - when_contains: .blocks.
    old_suffix: .22.bias
    new_suffix: .22.conv.bias
  - when_contains: .blocks.
    old_suffix: .25.weight
    new_suffix: .25.conv.weight
  - when_contains: .blocks.
    old_suffix: .25.bias
    new_suffix: .25.conv.bias
  - when_contains: .deblocks.
    old_suffix: .0.weight
    new_suffix: .0.conv_t.weight
  - when_contains: .deblocks.
    old_suffix: .0.bias
    new_suffix: .0.conv_t.bias
